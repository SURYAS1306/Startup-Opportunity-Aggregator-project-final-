services:
  - type: web
    name: startup-opportunity-aggregator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: RUN_SCRAPE_ON_START
        value: "1"
      - key: SCRAPE_KEYWORD
        value: AI startup
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: FLASK_SECRET_KEY
        generateValue: true
